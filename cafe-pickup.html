<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 출고 등록</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #FDF8F3;
    --card: #ffffff;
    --border: #EAE0D5;
    --text: #4A3626;
    --sub: #A08D7C;
    --accent: #B08968;
    --accent-dark: #8B6B4A;
    --accent-light: #F3E7DA;
    --danger: #B5615F;
    --good-bg: #EAF0E3;
    --mint: #8CA88A;
    --c1: #C9A47E;
    --c2: #8CA88A;
    --c3: #D9B872;
    --c4: #B08968;
    --c5: #C98F7A;
    --shadow-sm: 0 2px 8px rgba(176,137,104,0.15);
    --shadow-md: 0 8px 24px rgba(176,137,104,0.18);
    --radius-lg: 28px;
    --radius-sm: 16px;
    --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Pretendard", "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28px 16px 70px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 23px; margin: 0; font-weight: 900; letter-spacing: -0.01em; }
  .subtitle { color: var(--sub); font-size: 12.5px; margin: 6px 0 22px; line-height: 1.6; font-weight: 600; }

  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-4px) rotate(2deg); } }
  @keyframes panelIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .card {
    position: relative;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 20px 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    animation: panelIn .3s var(--bounce);
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-dark));
  }
  .card h2 { font-size: 15.5px; margin: 0 0 14px; font-weight: 800; letter-spacing: -0.01em; }
  .card h2::before { content: "✦ "; color: var(--accent); }

  .field-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .field { flex: 1; min-width: 120px; display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--sub); font-weight: 700; }
  input, select {
    padding: 12px 13px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    background: #fff;
    color: var(--text);
    width: 100%;
    transition: border-color .15s ease, box-shadow .2s var(--bounce), transform .15s var(--bounce);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-light);
    transform: translateY(-1px);
  }

  button { font-family: inherit; }
  button.primary {
    background: linear-gradient(135deg, #C9A47E, var(--accent)); color: #fff; border: none;
    padding: 14px 18px; border-radius: 999px; font-size: 15.5px; cursor: pointer; font-weight: 800;
    width: 100%;
    box-shadow: 0 4px 14px rgba(176,137,104,0.35);
    transition: transform .15s var(--bounce), box-shadow .15s var(--bounce);
  }
  button.primary:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 6px 18px rgba(176,137,104,0.4); }
  button.primary:active { transform: translateY(3px) scale(0.98); box-shadow: 0 2px 8px rgba(176,137,104,0.3); }
  button.secondary {
    background: #fff; border: 2px solid var(--border); padding: 11px 16px;
    border-radius: 999px; font-size: 14px; cursor: pointer; color: var(--sub); font-weight: 700;
    transition: transform .15s var(--bounce), border-color .15s ease, color .15s ease;
  }
  button.secondary:hover { transform: translateY(-2px) scale(1.02); border-color: var(--accent); color: var(--accent-dark); }
  button.link { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 13px; padding: 5px 9px; font-weight: 700; border-radius: 999px; transition: background .15s ease, transform .15s var(--bounce); }
  button.link:hover { background: var(--good-bg); transform: scale(1.05); }
  button.link.edit { color: var(--accent-dark); }
  button.link.edit:hover { background: var(--accent-light); }

  .segmented { display: flex; gap: 6px; margin-bottom: 14px; background: var(--good-bg); padding: 5px; border-radius: 999px; }
  .segmented button {
    flex: 1; padding: 9px; border: none; background: none;
    border-radius: 999px; font-size: 13px; cursor: pointer; color: #5B7A55; font-weight: 700;
    transition: background .2s var(--bounce), color .15s ease, transform .15s var(--bounce);
  }
  .segmented button.active { background: var(--mint); color: #fff; box-shadow: var(--shadow-sm); transform: scale(1.04); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 2px dashed var(--border); }
  th { color: var(--accent-dark); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  td.num, th.num { text-align: right; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s ease; }
  tbody tr:hover { background: var(--good-bg); }

  .empty { color: var(--sub); font-size: 13px; padding: 20px 4px; text-align: center; font-weight: 600; }
  .empty::before { content: "🍪 "; }
  .hint { font-size: 12px; color: var(--sub); margin: -4px 0 12px; line-height: 1.6; font-weight: 600; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px) scale(0.9);
    background: linear-gradient(135deg, #6B4E36, var(--accent-dark)); color: #fff; padding: 12px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none;
    box-shadow: var(--shadow-md);
    transition: opacity .3s var(--bounce), transform .3s var(--bounce);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
</style>
</head>
<body>
<div class="wrap">
  <h1><span style="display:inline-block; animation: bob 2.4s ease-in-out infinite">📦</span> 카페 출고 등록</h1>
  <div class="subtitle">가져가시는 만큼만 기록해주세요. 재고·레시피·원가 정보는 이 페이지에 없습니다.</div>

  <div class="card">
    <h2>어느 카페세요?</h2>
    <select id="cafe-select" onchange="onCafeChange()"></select>
  </div>

  <div class="card" id="form-card" style="display:none">
    <h2 id="form-title">출고 등록</h2>
    <div class="field-row">
      <div class="field">
        <label>날짜</label>
        <input id="ship-date" type="date">
      </div>
      <div class="field">
        <label>제품</label>
        <select id="ship-recipe" onchange="onRecipeChange()"></select>
      </div>
    </div>
    <div class="field-row" id="unit-toggle-row" style="display:none">
      <div class="field">
        <label>입력 단위</label>
        <div class="segmented" style="margin-bottom:0">
          <button type="button" id="unit-piece" class="active" onclick="setUnitMode('piece')">개별</button>
          <button type="button" id="unit-pack" onclick="setUnitMode('pack')">묶음</button>
        </div>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label id="qty-label">수량 (개)</label>
        <input id="ship-qty" type="number" min="0" step="any" placeholder="예: 10" inputmode="decimal">
      </div>
      <div class="field">
        <label>담당자</label>
        <input id="ship-picker" placeholder="예: 홍길동" autocomplete="off">
      </div>
    </div>
    <button class="primary" id="submit-btn" onclick="submitShipment()">출고 등록</button>
    <button class="secondary" id="cancel-edit-btn" style="display:none; width:100%; margin-top:8px" onclick="cancelEditShipment()">수정 취소</button>
  </div>

  <div class="card" id="history-card" style="display:none">
    <h2>최근 출고 내역</h2>
    <div id="history-table"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gxhueytibwxgvrelsfku.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_DI4x1BPSCEATAFpvtph02A_6PQbgOJI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let recipes = []; // {id, name, yieldQty, packLabel, packSize}
let cafes = [];   // {id, name}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function fmtQty(n) {
  const rounded = Math.round(n * 100) / 100;
  return rounded.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
}

function todayStr() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let unitMode = 'piece'; // 'piece' | 'pack'
let selectedCafeId = null;
let editingShipmentId = null;
let lastHistoryData = [];

async function initCafeSelect() {
  const sel = document.getElementById('cafe-select');
  sel.innerHTML = '<option value="">불러오는 중...</option>';

  const [{ data: cafeData, error: cafeErr }, { data: recipeData, error: recErr }] = await Promise.all([
    sb.rpc('list_cafes_public'),
    sb.rpc('list_products')
  ]);

  if (cafeErr) { sel.innerHTML = '<option value="">불러오기 실패</option>'; toast('카페 목록을 불러오지 못했습니다.'); return; }
  cafes = cafeData || [];
  recipes = (recipeData || []).map(r => ({ id: r.id, name: r.name, yieldQty: r.yield_qty, packLabel: r.pack_label, packSize: r.pack_size }));

  if (cafes.length === 0) {
    sel.innerHTML = '<option value="">등록된 카페가 없습니다 (관리자에게 문의)</option>';
    return;
  }
  sel.innerHTML = '<option value="">카페를 선택하세요</option>' +
    cafes.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

function onCafeChange() {
  selectedCafeId = document.getElementById('cafe-select').value || null;
  cancelEditShipment();
  document.getElementById('form-card').style.display = selectedCafeId ? 'block' : 'none';
  document.getElementById('history-card').style.display = selectedCafeId ? 'block' : 'none';
  if (!selectedCafeId) return;

  if (!document.getElementById('ship-date').value) {
    document.getElementById('ship-date').value = todayStr();
  }
  populateRecipeSelect();
  renderHistory();
}

function populateRecipeSelect() {
  const sel = document.getElementById('ship-recipe');
  sel.innerHTML = recipes.length
    ? recipes.map(r => `<option value="${r.id}">${escapeHtml(r.name)}</option>`).join('')
    : '<option value="">등록된 제품이 없습니다</option>';
  onRecipeChange();
}

function onRecipeChange() {
  const recipe = recipes.find(r => r.id === document.getElementById('ship-recipe').value);
  const row = document.getElementById('unit-toggle-row');
  unitMode = 'piece';
  document.getElementById('unit-piece').classList.add('active');
  document.getElementById('unit-pack').classList.remove('active');
  if (recipe && recipe.packLabel && recipe.packSize) {
    row.style.display = 'flex';
    document.getElementById('unit-pack').textContent = `묶음 (${recipe.packLabel}, ${recipe.packSize}개)`;
  } else {
    row.style.display = 'none';
  }
  updateQtyLabel();
}

function setUnitMode(mode) {
  unitMode = mode;
  document.getElementById('unit-piece').classList.toggle('active', mode === 'piece');
  document.getElementById('unit-pack').classList.toggle('active', mode === 'pack');
  updateQtyLabel();
}

function updateQtyLabel() {
  const recipe = recipes.find(r => r.id === document.getElementById('ship-recipe').value);
  const label = document.getElementById('qty-label');
  label.textContent = (unitMode === 'pack' && recipe && recipe.packLabel) ? `수량 (${recipe.packLabel})` : '수량 (개)';
}

async function submitShipment() {
  const date = document.getElementById('ship-date').value;
  const recipeId = document.getElementById('ship-recipe').value;
  const inputQty = parseFloat(document.getElementById('ship-qty').value);
  const pickedUpBy = document.getElementById('ship-picker').value.trim();
  const cafe = cafes.find(c => c.id === selectedCafeId);
  const recipe = recipes.find(r => r.id === recipeId);

  if (!date) { toast('날짜를 입력해주세요.'); return; }
  if (!cafe) { toast('카페를 다시 선택해주세요.'); return; }
  if (!recipe) { toast('제품을 선택해주세요.'); return; }
  if (!(inputQty > 0)) { toast('수량을 올바르게 입력해주세요.'); return; }
  if (!pickedUpBy) { toast('담당자를 입력해주세요.'); return; }

  const isPack = unitMode === 'pack' && recipe.packSize;
  const qty = isPack ? inputQty * recipe.packSize : inputQty;
  const enteredUnit = isPack ? recipe.packLabel : null;

  if (editingShipmentId) {
    const { error } = await sb.rpc('update_shipment', {
      p_shipment_id: editingShipmentId,
      p_cafe_id: selectedCafeId,
      p_recipe_id: recipeId,
      p_qty: qty,
      p_entered_qty: inputQty,
      p_entered_unit: enteredUnit,
      p_date: date,
      p_picked_up_by: pickedUpBy
    });
    if (error) { toast('수정 실패: ' + error.message); return; }
    toast('출고 내역이 수정되었습니다.');
    cancelEditShipment();
  } else {
    const { error } = await sb.rpc('create_shipment', {
      p_cafe_id: selectedCafeId,
      p_recipe_id: recipeId,
      p_qty: qty,
      p_entered_qty: inputQty,
      p_entered_unit: enteredUnit,
      p_date: date,
      p_picked_up_by: pickedUpBy
    });
    if (error) { toast('등록 실패: ' + error.message); return; }
    document.getElementById('ship-qty').value = '';
    document.getElementById('ship-picker').value = '';
    toast(`${cafe.name} 출고가 등록되었습니다.`);
  }
  renderHistory();
}

function editShipment(id) {
  const s = lastHistoryData.find(r => r.id === id);
  if (!s) return;
  editingShipmentId = id;
  document.getElementById('form-title').textContent = '출고 수정';
  document.getElementById('submit-btn').textContent = '수정 완료';
  document.getElementById('cancel-edit-btn').style.display = 'block';

  document.getElementById('ship-date').value = s.date;
  document.getElementById('ship-recipe').value = s.recipe_id || '';
  document.getElementById('ship-picker').value = s.picked_up_by || '';
  onRecipeChange();

  if (s.entered_unit) {
    setUnitMode('pack');
    document.getElementById('ship-qty').value = s.entered_qty;
  } else {
    setUnitMode('piece');
    document.getElementById('ship-qty').value = s.qty;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEditShipment() {
  editingShipmentId = null;
  document.getElementById('form-title').textContent = '출고 등록';
  document.getElementById('submit-btn').textContent = '출고 등록';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('ship-qty').value = '';
  document.getElementById('ship-picker').value = '';
}

async function deleteShipmentRow(id) {
  if (!confirm('이 출고 기록을 삭제하시겠습니까?')) return;
  const { error } = await sb.rpc('delete_shipment', { p_shipment_id: id, p_cafe_id: selectedCafeId });
  if (error) { toast('삭제 실패: ' + error.message); return; }
  if (editingShipmentId === id) cancelEditShipment();
  toast('삭제되었습니다.');
  renderHistory();
}

async function renderHistory() {
  const el = document.getElementById('history-table');
  el.innerHTML = '<div class="empty">불러오는 중...</div>';

  const { data, error } = await sb.rpc('list_shipment_history', { p_cafe_id: selectedCafeId });
  if (error || !data || data.length === 0) {
    lastHistoryData = [];
    el.innerHTML = '<div class="empty">출고 기록이 없습니다.</div>';
    return;
  }
  lastHistoryData = data;

  const rows = data.map(s => {
    const qtyText = s.entered_unit ? `${fmtQty(s.entered_qty)}${escapeHtml(s.entered_unit)}` : `${fmtQty(s.qty)}개`;
    return `<tr>
      <td>${s.date}</td>
      <td>${escapeHtml(s.product_name || '(삭제된 제품)')}</td>
      <td class="num">${qtyText}</td>
      <td>${escapeHtml(s.picked_up_by || '-')}</td>
      <td class="num">
        <button class="link edit" onclick="editShipment('${s.id}')">수정</button>
        <button class="link" onclick="deleteShipmentRow('${s.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table><thead><tr><th>날짜</th><th>제품</th><th class="num">수량</th><th>담당자</th><th class="num"></th></tr></thead><tbody>${rows}</tbody></table>`;
}

initCafeSelect();
</script>
</body>
</html>
